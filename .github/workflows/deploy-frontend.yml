name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/index.html'
      - 'frontend/package*.json'
      - 'frontend/vite.config.*'
      - 'frontend/tsconfig.*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the full repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache node_modules based on package-lock.json
      # so repeated builds are faster
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Clean install dependencies based on package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      # Build the Vite app
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # SCP the built dist/ folder to the server
      # strip_components: 1 removes the leading 'frontend/'
      # so it lands at /home/ubuntu/Web_Portfolio/frontend/dist/
      - name: Copy dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/"
          target: "/home/ubuntu/Web_Portfolio/frontend/"
          strip_components: 1